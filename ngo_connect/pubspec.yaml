name: ngo_connect
description: NGO Connect Platform (Flutter UI)

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.1.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.5.1
  http: ^1.2.0
  firebase_core: ^3.0.0
  firebase_auth: ^5.0.0
  cloud_firestore: ^5.0.0
  firebase_storage: ^12.0.0
  google_fonts: ^6.1.0
  google_generative_ai: ^0.4.6
  cupertino_icons: ^1.0.6
  flutter_dotenv: ^5.2.1
  # google_maps_flutter: ^2.9.0  # disabled — Maps API pricing
  # geocoding: ^3.0.0            # disabled — depends on Maps API
  file_picker: ^8.0.0
  fl_chart: ^0.69.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  glados: ^1.1.7

flutter:
  uses-material-design: true
  assets:
    - .env
